name: go-autoformat

on:
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: read

concurrency:
  group: go-autoformat-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  format:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.head.repo.full_name == github.repository &&
       github.event.pull_request.draft == false)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout trusted PR branch
        if: github.event_name == 'pull_request_target'
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Checkout default branch
        if: github.event_name == 'workflow_dispatch'
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23.x'

      - name: Format Go files
        shell: bash
        run: |
          mapfile -t files < <(find . -type f -name '*.go' -not -path './vendor/*' -not -path './.git/*' | sort)
          if (( ${#files[@]} > 0 )); then
            gofmt -w "${files[@]}"
          fi

      - name: Commit formatting changes
        shell: bash
        run: |
          if git diff --quiet; then
            echo 'No formatting changes.'
            exit 0
          fi
          git config user.name 'ti-autoformat[bot]'
          git config user.email 'ti-autoformat[bot]@users.noreply.github.com'
          git add -- '*.go'
          git commit -m 'style(go): apply gofmt'
          git push
